{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Biswa | Portfolio{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        midnight: '#0a0f1c',
                        electricBlue: '#2563eb',
                        cyanGlow: '#06b6d4',
                        neonViolet: '#7c3aed',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    animation: {
                        'float-slow': 'float 8s ease-in-out infinite',
                        'float-fast': 'float 5s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* The Noise Overlay */
        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 50; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Vercel/Linear-style Glass */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="relative min-h-screen bg-background selection:bg-neonViolet selection:text-white">
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-neonViolet rounded-full mix-blend-screen filter blur-[128px] opacity-20 animate-float-slow pointer-events-none z-0"></div>
    <div class="fixed top-[20%] right-[-5%] w-[30rem] h-[30rem] bg-cyanGlow rounded-full mix-blend-screen filter blur-[128px] opacity-10 animate-float-fast pointer-events-none z-0" style="animation-delay: 2s;"></div>
    <div class="bg-noise"></div>

    <div class="relative z-10 flex flex-col min-h-screen">
        {% include 'includes/navbar.html' %}
        <main class="flex-grow">
            {% block content %}{% endblock content %}
        </main>
        {% include 'includes/footer.html' %}
    </div>

    <script type="module">
        import { animate, stagger, inView } from "https://cdn.jsdelivr.net/npm/motion@11.11.13/+esm";
        window.animate = animate;
        window.stagger = stagger;
        window.inView = inView;
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
